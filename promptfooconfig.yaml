# Promptfoo configuration for evaluating AI skills/agents
# Metrics: accuracy, cost, cost-accuracy ratio, scoring rubrics, completeness

prompts:
  - id: file://prompts/skill_eval.txt
    label: general_prompt
  - id: file://prompts/code_review.txt
    label: code_review_prompt

providers:
  - id: 'exec: bash providers/claude_code.sh'
    label: claude-code
  - id: 'exec: bash providers/kiro_cli.sh'
    label: kiro-cli

# Custom scoring: cost-accuracy ratio as a derived metric
defaultTest:
  options:
    provider: 'exec: bash providers/grader.sh'  # grading provider for model-graded assertions
    rubricPrompt: file://graders/judge-prompt.txt
  assert:
    # Latency gate — fail if a single call exceeds 30s
    - type: latency
      threshold: 30000
      metric: cost
      weight: 1

    # Rubric: overall quality judged by LLM
    - type: llm-rubric
      threshold: 0.7
      value: |
        The response must:
        1. Directly address the task given (even if the task is trivial)
        2. Be factually correct
        3. Not hallucinate information
        A short, correct answer to a simple task is perfectly acceptable.
      metric: rubric_quality
      weight: 2

derivedMetrics:
  # Cost-accuracy ratio: uses latency as a proxy for cost (no API key = no token cost)
  # Lower is better (fast + high quality = best)
  - name: cost_accuracy_ratio
    value: '(1 - cost) / (rubric_quality + 0.0001)'

tests:
  # --- Test 1: Factual accuracy ---
  - description: 'Factual question — capital of France'
    vars:
      task: 'What is the capital of France?'
      context: 'geography'
    assert:
      - type: icontains
        value: 'Paris'
        metric: accuracy
        weight: 3
      - type: llm-rubric
        threshold: 0.8
        value: 'The response correctly identifies Paris as the capital of France. A single-word answer "Paris" is perfectly acceptable.'
        metric: accuracy_graded
        weight: 2

  # --- Test 2: Completeness ---
  - description: 'Multi-part question — completeness check'
    vars:
      task: 'List the 3 branches of the US government and briefly describe each.'
      context: 'civics'
    assert:
      - type: icontains-all
        value:
          - 'legislative'
          - 'executive'
          - 'judicial'
        metric: completeness
        weight: 3
      - type: llm-rubric
        threshold: 0.7
        value: |
          The response must cover ALL three branches (legislative, executive, judicial)
          with a brief but accurate description of each branch's role.
          Deduct points for missing branches or inaccurate descriptions.
        metric: completeness_rubric
        weight: 2

  # --- Test 3: Rubric-scored reasoning ---
  - description: 'Reasoning task — explain a concept'
    vars:
      task: 'Explain why the sky is blue in 2-3 sentences.'
      context: 'science'
    assert:
      - type: llm-rubric
        threshold: 0.7
        value: |
          Score based on:
          - Mentions Rayleigh scattering or light scattering (required)
          - Explains that shorter wavelengths scatter more
          - Is concise (2-3 sentences as requested)
          - Is scientifically accurate
        metric: rubric_reasoning
        weight: 3
      - type: javascript
        value: |
          const sentences = output.split(/[.!?]+/).filter(s => s.trim().length > 0);
          if (sentences.length >= 2 && sentences.length <= 4) {
            return { pass: true, score: 1, reason: `${sentences.length} sentences — within range` };
          }
          return { pass: false, score: 0.3, reason: `${sentences.length} sentences — outside 2-3 range` };
        metric: completeness_format
        weight: 1

  # --- Test 4: Cost-sensitive task ---
  - description: 'Simple task — should be cheap'
    vars:
      task: 'Say hello in French.'
      context: 'translation'
    assert:
      - type: icontains
        value: 'Bonjour'
        metric: accuracy
        weight: 2
      - type: latency
        threshold: 30000
        metric: cost_efficiency
        weight: 2
      - type: javascript
        value: |
          // Penalize overly verbose responses for simple tasks
          const words = output.split(/\s+/).length;
          const score = Math.max(0, 1 - (words - 5) / 50);
          return { pass: words < 30, score, reason: `${words} words` };
        metric: conciseness
        weight: 1

  # --- Test 5: Structured output — JSON with required fields ---
  - description: 'Structured output — JSON with required fields'
    vars:
      task: 'Return a JSON object with keys "name", "population", and "continent" for Tokyo. Output only the raw JSON, no markdown fences.'
      context: 'structured_output'
    assert:
      - type: javascript
        value: |
          // Strip markdown fences if present
          const cleaned = output.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
          try { JSON.parse(cleaned); return { pass: true, score: 1, reason: 'Valid JSON' }; }
          catch (e) { return { pass: false, score: 0, reason: 'Invalid JSON: ' + e.message }; }
        metric: accuracy
        weight: 2
      - type: javascript
        value: |
          const cleaned = output.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
          try {
            const data = JSON.parse(cleaned);
            const hasName = 'name' in data;
            const hasPop = 'population' in data;
            const hasContinent = 'continent' in data;
            const allPresent = hasName && hasPop && hasContinent;
            const score = [hasName, hasPop, hasContinent].filter(Boolean).length / 3;
            return { pass: allPresent, score, reason: `Fields present: ${score * 3}/3` };
          } catch (e) {
            return { pass: false, score: 0, reason: 'Invalid JSON' };
          }
        metric: completeness
        weight: 3
      - type: llm-rubric
        threshold: 0.7
        value: 'The output contains accurate information about Tokyo: population approximately 14 million, located in Asia.'
        metric: accuracy_graded
        weight: 2

  # --- Test 6: SQL injection detection ---
  - description: 'Code review — catches SQL injection'
    options:
      prompts: [file://prompts/code_review.txt]
    vars:
      task: |
        Review this code for issues:
        ```javascript
        app.get('/users', (req, res) => {
          const name = req.query.name;
          const result = db.query(`SELECT * FROM users WHERE name = '${name}'`);
          res.json(result);
        });
        ```
      context: 'code_review'
      grading_notes: 'Focus on security vulnerabilities, especially SQL injection'
    assert:
      - type: icontains
        value: 'injection'
        metric: accuracy
        weight: 3
      - type: llm-rubric
        threshold: 0.8
        value: |
          The review must:
          1. Identify the SQL injection vulnerability specifically (not just generic "security issue")
          2. Point to the string interpolation of user input into the query
          3. Suggest parameterized queries or prepared statements as the fix
          4. Not report false positives unrelated to the actual code
        metric: security_detection
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasVulnId = lower.includes('injection') || lower.includes('unsanitized');
          const hasFix = lower.includes('parameterized') || lower.includes('prepared') || lower.includes('placeholder');
          const score = [hasVulnId, hasFix].filter(Boolean).length / 2;
          return { pass: hasVulnId && hasFix, score, reason: `Vuln identified: ${hasVulnId}, Fix suggested: ${hasFix}` };
        metric: completeness
        weight: 2

  # --- Test 7: Off-by-one bug detection ---
  - description: 'Code review — catches off-by-one / correctness bug'
    options:
      prompts: [file://prompts/code_review.txt]
    vars:
      task: |
        Review this code for issues:
        ```python
        def get_last_n_items(items, n):
            result = []
            for i in range(len(items) - n, len(items) + 1):
                result.append(items[i])
            return result
        ```
      context: 'code_review'
      grading_notes: 'Look for correctness issues and boundary conditions'
    assert:
      - type: g-eval
        threshold: 0.8
        value: |
          Identify the off-by-one error (range goes to len(items) + 1, causing IndexError)
          Explain WHY it fails (accessing items[len(items)] which is out of bounds)
          Suggest a correct fix (e.g., items[-n:] or range(len(items) - n, len(items)))
        metric: correctness_detection
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const catchesBug = lower.includes('off-by-one') || lower.includes('index') || lower.includes('out of range') || lower.includes('+ 1');
          const suggestsFix = lower.includes('items[-n:]') || lower.includes('len(items))') || lower.includes('slice');
          const score = [catchesBug, suggestsFix].filter(Boolean).length / 2;
          return { pass: catchesBug, score, reason: `Bug caught: ${catchesBug}, Fix: ${suggestsFix}` };
        metric: completeness
        weight: 2

  # --- Test 8: Clean code review (no false positives) ---
  - description: 'Code review — does not hallucinate issues in clean code'
    options:
      prompts: [file://prompts/code_review.txt]
    vars:
      task: |
        Review this code for issues:
        ```typescript
        async function fetchUser(id: string): Promise<User | null> {
          if (!id || typeof id !== 'string') {
            throw new Error('Invalid user ID');
          }
          const response = await fetch(`/api/users/${encodeURIComponent(id)}`);
          if (!response.ok) {
            throw new Error(`Failed to fetch user: ${response.status}`);
          }
          return response.json();
        }
        ```
      context: 'code_review'
      grading_notes: 'This is well-written code - avoid false positives'
    assert:
      - type: llm-rubric
        threshold: 0.7
        value: |
          This code is well-written with proper input validation, URL encoding, and error handling.
          The review should:
          1. NOT flag false security issues (input IS validated, URL IS encoded)
          2. NOT flag missing error handling (errors ARE thrown)
          3. Acknowledge the code is largely correct
          4. At most suggest minor improvements (e.g., type narrowing on response.json())
          A review that invents critical/high issues for this code is WRONG.
        metric: false_positive_avoidance
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          // Only flag if the review invents serious security/injection issues that don't exist
          const falseAlarm = lower.includes('sql injection') || lower.includes('xss') || lower.includes('command injection');
          const reasonable = lower.includes('solid') || lower.includes('clean') || lower.includes('well') || lower.includes('minor') || lower.includes('nit') || lower.includes('low') || lower.includes('good') || lower.includes('correct');
          const score = falseAlarm ? 0 : reasonable ? 1 : 0.6;
          return { pass: !falseAlarm, score, reason: `Invented security issue: ${falseAlarm}, Acknowledges quality: ${reasonable}` };
        metric: accuracy
        weight: 3

  # --- Test 9: Multi-discipline coverage ---
  - description: 'Code review — covers multiple disciplines'
    options:
      prompts: [file://prompts/code_review.txt]
    vars:
      task: |
        Review this code for issues:
        ```javascript
        app.post('/transfer', (req, res) => {
          const { from, to, amount } = req.body;
          const fromBalance = db.query(`SELECT balance FROM accounts WHERE id = '${from}'`);
          if (fromBalance >= amount) {
            db.query(`UPDATE accounts SET balance = balance - ${amount} WHERE id = '${from}'`);
            db.query(`UPDATE accounts SET balance = balance + ${amount} WHERE id = '${to}'`);
          }
          res.json({ success: true });
        });
        ```
      context: 'code_review'
      grading_notes: 'Look for issues across security, correctness, and design'
    assert:
      - type: g-eval
        threshold: 0.8
        value: |
          This code has issues across multiple disciplines. Identify AT LEAST 3 of these:
          1. SECURITY: SQL injection via string interpolation of from/to/amount
          2. CORRECTNESS: No transaction — transfer is not atomic (race condition)
          3. CORRECTNESS: No input validation on amount (could be negative, NaN, etc.)
          4. CORRECTNESS: Always returns success even if balance check fails
          5. DESIGN: No error handling — if any query fails, no rollback
        metric: multi_discipline_coverage
        weight: 3
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const security = lower.includes('injection') || lower.includes('sanitiz');
          const atomicity = lower.includes('transaction') || lower.includes('atomic') || lower.includes('race');
          const validation = lower.includes('validation') || lower.includes('negative') || lower.includes('NaN');
          const errorHandling = lower.includes('error') || lower.includes('rollback') || lower.includes('always returns success');
          const disciplines = [security, atomicity, validation, errorHandling].filter(Boolean).length;
          const score = Math.min(disciplines / 3, 1);
          return { pass: disciplines >= 3, score, reason: `Disciplines covered: ${disciplines}/4 (security:${security}, atomicity:${atomicity}, validation:${validation}, errors:${errorHandling})` };
        metric: completeness
        weight: 3

  # --- Test 10: Technical explanation quality ---
  - description: 'Technical explanation — async/await vs Promises'
    vars:
      task: 'Explain the difference between async/await and Promises in JavaScript'
      context: 'programming'
    assert:
      - type: llm-rubric
        threshold: 0.7
        value: |
          The response must:
          1. Explain that async/await is syntactic sugar over Promises
          2. Show or describe the difference in syntax (chaining vs sequential)
          3. Mention error handling differences (try/catch vs .catch())
          4. Be technically accurate
        metric: rubric_quality
        weight: 3
      - type: icontains-all
        value:
          - 'await'
          - 'then'
        metric: completeness
        weight: 2

# Assertion scoring override: custom function that factors in cost-accuracy ratio
assertScoringFunction: file://scoring.js
